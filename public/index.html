<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackOS Terminal Cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal-container">
        <div class="title-bar">
            <span class="title">Command Prompt - Node Engine v1.0</span>
            <div class="controls">
                <span class="dot min"></span>
                <span class="dot max"></span>
                <span class="dot close"></span>
            </div>
        </div>
        
        <div class="terminal-body" id="terminalBody">
            <pre id="output">HackOS Cloud Terminal Environment [Version 2026.1.0]&#10;(c) 2026 HackOS Corp. All rights reserved.&#10;&#10;Type Linux/Shell commands (e.g., 'ls', 'pwd', 'node -v')&#10;&#10;$ </pre>
            <div class="input-line">
                <input type="text" id="cmdInput" autofocus placeholder="Type command..." autocomplete="off">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
