<!DOCTYPE html>
<html>

<head>

<title>AI Desktop OS</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="desktop">


<div class="icons">

<button onclick="openWindow('terminal')">
💻 AI Terminal
</button>


<button onclick="openWindow('editor')">
📝 Code Editor
</button>


<button onclick="openWindow('files')">
📁 Files
</button>


</div>



<div class="window" id="terminal">


<div class="title">
AI Terminal

<span onclick="closeWindow('terminal')">
✖
</span>

</div>


<div id="output">

AI Desktop Started...

<br>
C:\Users\User>

</div>


<input id="command"
placeholder="Ask AI or type command">


<button onclick="askAI()">
RUN AI
</button>


</div>




<div class="window" id="editor">


<div class="title">

Code Editor

<span onclick="closeWindow('editor')">
✖
</span>

</div>


<textarea id="code">

<h1>Hello AI</h1>

</textarea>


<button onclick="preview()">
Preview
</button>


</div>




<div class="window" id="files">


<div class="title">

File Explorer

<span onclick="closeWindow('files')">
✖
</span>

</div>


<p>
📂 Projects
</p>

<p>
📄 index.html
</p>

<p>
📄 script.js
</p>


</div>




<div class="taskbar">

<button onclick="startMenu()">

🪟 Start

</button>


<div id="menu">

AI Apps

<br><br>

Code Tools

</div>


</div>


</div>


<script src="script.js"></script>


</body>

</html>
