<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackOS Terminal Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="landscape-warning">
        🔄 Please rotate your phone to Landscape Mode to play Solitaire!
    </div>

    <div class="terminal-container">
        <div class="title-bar">
            <span class="title">Command Prompt - Solitaire Engine v2.0</span>
            <div class="controls">
                <span class="dot min"></span>
                <span class="dot max"></span>
                <span class="dot close"></span>
            </div>
        </div>
        
        <div class="terminal-body" id="terminalBody">
            <pre id="output">HackOS Terminal Cloud [Version 2026.2.0]&#10;(c) 2026 HackOS Corp.&#10;&#10;Type 'solitaire' and rotate screen to landscape to play!&#10;&#10;$ </pre>
            <div class="input-line">
                <input type="text" id="cmdInput" autofocus placeholder="Type command..." autocomplete="off">
            </div>
        </div>
    </div>

    <div class="mobile-controls" id="mobileDPad">
        <div class="row">
            <div class="btn" onclick="triggerMobileKey('w')">▲</div>
        </div>
        <div class="row">
            <div class="btn" onclick="triggerMobileKey('a')">◀</div>
            <div class="btn" id="restartBtn" onclick="triggerMobileKey('r')">🔄</div>
            <div class="btn" onclick="triggerMobileKey('d')">▶</div>
        </div>
        <div class="row">
            <div class="btn" onclick="triggerMobileKey('s')">▼</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
